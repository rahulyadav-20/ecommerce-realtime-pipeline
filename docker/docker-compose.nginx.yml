# ==============================================================================
# docker-compose.nginx.yml — Nginx reverse proxy + certbot companion
#
# Run alongside the core stack:
#   docker compose -f docker/docker-compose.yml \
#                  -f docker/docker-compose.nginx.yml up -d
#
# First-time SSL setup:
#   docker compose ... run --rm certbot \
#     certonly --webroot --webroot-path /var/www/certbot \
#     -d analytics.example.com -m admin@example.com --agree-tos --no-eff-email
# ==============================================================================

services:

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx-proxy:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    image: ecom/nginx-proxy:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Live nginx config (editable without rebuild)
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
      # TLS certificates — managed by certbot companion
      - letsencrypt-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
      # DH params (generated by setup-certbot.sh)
      - nginx-ssl:/etc/nginx/ssl
      # Basic auth passwords
      - nginx-auth:/etc/nginx/auth
      # Logs (shipped to ELK via Filebeat)
      - nginx-logs:/var/log/nginx
      # Custom error pages
      - ../nginx/html:/usr/share/nginx/html:ro
    environment:
      TZ: UTC
    depends_on:
      - dashboard-api
      - dashboard-ui
    networks:
      - ecom-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Certbot (auto-renewal companion) ────────────────────────────────────────
  # Runs certonly on startup (no-op if cert is still valid) and exits.
  # Docker restarts it daily via the restart policy + sleep loop.
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - letsencrypt-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Renew if cert expires in < 30 days; sleep 12 h between checks
    entrypoint: >
      sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot --webroot-path /var/www/certbot --quiet
          sleep 43200 &
          wait \$\${!};
        done"
    networks:
      - ecom-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Filebeat (ships nginx JSON logs to Elasticsearch) ───────────────────────
  filebeat-nginx:
    image: elastic/filebeat:8.17.0
    container_name: filebeat-nginx
    user: root
    restart: unless-stopped
    volumes:
      - ../nginx/filebeat-nginx.yml:/usr/share/filebeat/filebeat.yml:ro
      - nginx-logs:/var/log/nginx:ro
    environment:
      ELASTICSEARCH_HOST: "http://elasticsearch:9200"
      KIBANA_HOST: "http://kibana:5601"
    command: filebeat -e --strict.perms=false
    depends_on:
      - nginx-proxy
    networks:
      - ecom-net

volumes:
  letsencrypt-certs:
    name: letsencrypt-certs
  certbot-webroot:
    name: certbot-webroot
  nginx-ssl:
    name: nginx-ssl
  nginx-auth:
    name: nginx-auth
  nginx-logs:
    name: nginx-logs

networks:
  ecom-net:
    external: true
    name: docker_ecom-net
