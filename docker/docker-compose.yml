#version: '3.8'

services:
  # ============================================================================
  # ZOOKEEPER
  # ============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  # ============================================================================
  # KAFKA
  # ============================================================================
  kafka:
    image: confluentinc/cp-kafka:5.5.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ============================================================================
  # HDFS NAMENODE
  # ============================================================================
  namenode:
    image: bde2020/hadoop-namenode:latest
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: "ecommerce-cluster"
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      HDFS_CONF_dfs_replication: 1
    volumes:
      - namenode-data:/hadoop/dfs/name
    env_file:
      - ./config/hadoop.env

  # ============================================================================
  # HDFS DATANODE
  # ============================================================================
  datanode:
    image: bde2020/hadoop-datanode:latest
    container_name: datanode
    hostname: datanode
    depends_on:
      - namenode
    environment:
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      HDFS_CONF_dfs_replication: 1
    volumes:
      - datanode-data:/hadoop/dfs/data
    env_file:
      - ./config/hadoop.env

  # ============================================================================
  # POSTGRES (for Druid metadata)
  # ============================================================================
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: druid
      POSTGRES_PASSWORD: druid
      POSTGRES_DB: druid
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ============================================================================
  # DRUID COORDINATOR
  # ============================================================================
  druid-coordinator:
    image: apache/druid:26.0.0
    container_name: druid-coordinator
    depends_on:
      - zookeeper
      - postgres
    ports:
      - "8088:8081"
    command: coordinator-overlord
    environment:
      - DRUID_XMS=256m
      - DRUID_XMX=512m
      - druid_zk_service_host=zookeeper:2181
      - druid_metadata_storage_type=postgresql
      - druid_metadata_storage_connector_connectURI=jdbc:postgresql://postgres:5432/druid
      - druid_metadata_storage_connector_user=druid
      - druid_metadata_storage_connector_password=druid
      - druid_coordinator_asOverlord_enabled=true
      - druid_coordinator_asOverlord_overlordService=druid/overlord
      - druid_indexer_runner_type=remote
    volumes:
      - druid-coordinator-data:/opt/druid/var

  # ============================================================================
  # DRUID BROKER
  # ============================================================================
  druid-broker:
    image: apache/druid:26.0.0
    container_name: druid-broker
    depends_on:
      - zookeeper
      - druid-coordinator
    ports:
      - "8082:8082"
    command: broker
    environment:
      - DRUID_XMS=512m
      - DRUID_XMX=1g
      - druid_processing_buffer_sizeBytes=134217728
      - druid_processing_numThreads=2
    volumes:
      - druid-broker-data:/opt/druid/var

  # ============================================================================
  # DRUID HISTORICAL
  # ============================================================================
  druid-historical:
    image: apache/druid:26.0.0
    container_name: druid-historical
    depends_on:
      - zookeeper
      - druid-coordinator
    ports:
      - "8083:8083"
    command: historical
    environment:
      - DRUID_XMS=512m
      - DRUID_XMX=1g
      - druid_processing_buffer_sizeBytes=134217728
      - druid_processing_numThreads=2
      - druid_segmentCache_locations=[{"path":"/opt/druid/var/druid/segment-cache","maxSize":10737418240}]
    volumes:
      - druid-historical-data:/opt/druid/var

  # ============================================================================
  # DRUID MIDDLEMANAGER
  # ============================================================================
  druid-middlemanager:
    image: apache/druid:26.0.0
    container_name: druid-middlemanager
    depends_on:
      - zookeeper
      - druid-coordinator
    ports:
      - "8091:8091"
      - "8100-8105:8100-8105"
    command: middleManager
    environment:
      - DRUID_XMS=128m
      - DRUID_XMX=256m
      - druid_indexer_runner_javaOptsArray=["-server","-Xms256m","-Xmx256m"]
      - druid_indexer_fork_property_druid_processing_buffer_sizeBytes=134217728
      - druid_indexer_fork_property_druid_processing_numThreads=2
    volumes:
      - druid-middlemanager-data:/opt/druid/var

  # ============================================================================
  # DRUID ROUTER
  # ============================================================================
  druid-router:
    image: apache/druid:26.0.0
    container_name: druid-router
    depends_on:
      - druid-broker
      - druid-coordinator
    ports:
      - "8888:8888"
    command: router
    environment:
      - DRUID_XMS=128m
      - DRUID_XMX=256m
    volumes:
      - druid-router-data:/opt/druid/var

  # ============================================================================
  # SPARK MASTER
  # ============================================================================
  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./src:/opt/spark-apps
      - spark-master-data:/opt/bitnami/spark

  # ============================================================================
  # SPARK WORKER 1
  # ============================================================================
  spark-worker-1:
    image: apache/spark:latest
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./src:/opt/spark-apps
      - spark-worker-1-data:/opt/bitnami/spark

  # ============================================================================
  # SPARK WORKER 2
  # ============================================================================
  spark-worker-2:
    image: apache/spark:latest
    container_name: spark-worker-2
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./src:/opt/spark-apps
      - spark-worker-2-data:/opt/bitnami/spark

  # ============================================================================
  # AIRFLOW POSTGRES
  # ============================================================================
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data

  # ============================================================================
  # ============================================================================
  # AIRFLOW DB INIT
  # ============================================================================
  airflow-init:
    image: apache/airflow:2.8.4
    container_name: airflow-init
    depends_on:
      - airflow-postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    profiles:
      - init

  # AIRFLOW WEBSERVER
  # ============================================================================
  airflow-webserver:
    image: apache/airflow:2.8.4
    container_name: airflow-webserver
    depends_on:
      - airflow-postgres
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: webserver

  # ============================================================================
  # AIRFLOW SCHEDULER
  # ============================================================================
  airflow-scheduler:
    image: apache/airflow:2.8.4
    container_name: airflow-scheduler
    depends_on:
      - airflow-postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: scheduler

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  namenode-data:
  datanode-data:
  postgres-data:
  druid-coordinator-data:
  druid-broker-data:
  druid-historical-data:
  druid-middlemanager-data:
  druid-router-data:
  spark-master-data:
  spark-worker-1-data:
  spark-worker-2-data:
  airflow-postgres-data:

networks:
  default:
    name: ecommerce-network
