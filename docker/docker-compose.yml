#version: '3.8'

services:
  # ============================================================================
  # ZOOKEEPER
  # ============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  # ============================================================================
  # KAFKA
  # ============================================================================
  kafka:
    image: confluentinc/cp-kafka:5.5.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ============================================================================
  # HDFS NAMENODE
  # ============================================================================
  namenode:
    image: bde2020/hadoop-namenode:latest
    platform: linux/amd64
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: "ecommerce-cluster"
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      HDFS_CONF_dfs_replication: 1
    volumes:
      - namenode-data:/hadoop/dfs/name
    env_file:
      - ./config/hadoop.env

  # ============================================================================
  # HDFS DATANODE
  # ============================================================================
  datanode:
    image: bde2020/hadoop-datanode:latest
    platform: linux/amd64
    container_name: datanode
    hostname: datanode
    depends_on:
      - namenode
    environment:
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      HDFS_CONF_dfs_replication: 1
    volumes:
      - datanode-data:/hadoop/dfs/data
    env_file:
      - ./config/hadoop.env

  # ============================================================================
  # POSTGRES (for Druid metadata)
  # ============================================================================
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: druid
      POSTGRES_PASSWORD: druid
      POSTGRES_DB: druid
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druid"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # DRUID COORDINATOR + OVERLORD (NO JVM OPTS - USING DEFAULTS)
  # ============================================================================
  druid-coordinator:
    image: apache/druid:26.0.0
    platform: linux/amd64
    container_name: druid-coordinator
    hostname: druid-coordinator
    depends_on:
      - zookeeper
      - postgres
    ports:
      - "8081:8081"
    volumes:
      - ./druid-conf/common.runtime.properties:/opt/druid/conf/druid/cluster/_common/common.runtime.properties
      - ./druid-conf/coordinator.runtime.properties:/opt/druid/conf/druid/cluster/_common/coordinator.runtime.properties
      - ./druid-conf/coordinator.jvm.config:/opt/druid/conf/druid/cluster/misc/jvm.config
      - druid-coordinator-data:/opt/druid/var
    command: coordinator-overlord

  druid-broker:
    image: apache/druid:26.0.0
    platform: linux/amd64
    container_name: druid-broker
    hostname: druid-broker
    depends_on:
      - zookeeper
      - druid-coordinator
    ports:
      - "8082:8082"
    volumes:
      - ./druid-conf/common.runtime.properties:/opt/druid/conf/druid/cluster/_common/common.runtime.properties
      - ./druid-conf/broker.runtime.properties:/opt/druid/conf/druid/cluster/_common/broker.runtime.properties
      - ./druid-conf/broker.jvm.config:/opt/druid/conf/druid/cluster/misc/jvm.config
      - druid-broker-data:/opt/druid/var
    command: broker

  druid-historical:
    image: apache/druid:26.0.0
    platform: linux/amd64
    container_name: druid-historical
    hostname: druid-historical
    depends_on:
      - zookeeper
      - druid-coordinator
    ports:
      - "8083:8083"
    volumes:
      - ./druid-conf/common.runtime.properties:/opt/druid/conf/druid/cluster/_common/common.runtime.properties
      - ./druid-conf/historical.runtime.properties:/opt/druid/conf/druid/cluster/_common/historical.runtime.properties
      - ./druid-conf/historical.jvm.config:/opt/druid/conf/druid/cluster/misc/jvm.config
      - druid-historical-data:/opt/druid/var
    command: historical

  druid-middlemanager:
    image: apache/druid:26.0.0
    platform: linux/amd64
    container_name: druid-middlemanager
    hostname: druid-middlemanager
    depends_on:
      - zookeeper
      - druid-coordinator
    ports:
      - "8091:8091"
    volumes:
      - ./druid-conf/common.runtime.properties:/opt/druid/conf/druid/cluster/_common/common.runtime.properties
      - ./druid-conf/middlemanager.runtime.properties:/opt/druid/conf/druid/cluster/_common/middlemanager.runtime.properties
      - ./druid-conf/middlemanager.jvm.config:/opt/druid/conf/druid/cluster/misc/jvm.config
      - druid-middlemanager-data:/opt/druid/var
    command: middleManager

  druid-router:
    image: apache/druid:26.0.0
    platform: linux/amd64
    container_name: druid-router
    hostname: druid-router
    depends_on:
      - druid-broker
      - druid-coordinator
    ports:
      - "8888:8888"
    volumes:
      - ./druid-conf/common.runtime.properties:/opt/druid/conf/druid/cluster/_common/common.runtime.properties
      - ./druid-conf/router.runtime.properties:/opt/druid/conf/druid/cluster/_common/router.runtime.properties
      - ./druid-conf/router.jvm.config:/opt/druid/conf/druid/cluster/misc/jvm.config
      - druid-router-data:/opt/druid/var
    command: router


  # ============================================================================
  # SPARK MASTER
  # ============================================================================
  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./src:/opt/spark-apps

  spark-worker-1:
    image: apache/spark:latest
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    volumes:
      - ./src:/opt/spark-apps

  spark-worker-2:
    image: apache/spark:latest
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    volumes:
      - ./src:/opt/spark-apps

  # ============================================================================
  # AIRFLOW POSTGRES
  # ============================================================================
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # AIRFLOW DB INIT (One-time setup)
  # ============================================================================
  airflow-init:
    image: apache/airflow:2.8.4
    container_name: airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow-init.sh:/airflow-init.sh
      - airflow-init-marker:/opt/airflow
    entrypoint: /bin/bash
    command: /airflow-init.sh
    restart: "no"

  # ============================================================================
  # AIRFLOW WEBSERVER
  # ============================================================================
  airflow-webserver:
    image: apache/airflow:2.8.4
    container_name: airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-init-marker:/opt/airflow
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================================================
  # AIRFLOW SCHEDULER
  # ============================================================================
  airflow-scheduler:
    image: apache/airflow:2.8.4
    container_name: airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-init-marker:/opt/airflow
    command: scheduler

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  namenode-data:
  datanode-data:
  postgres-data:
  druid-coordinator-data:
  druid-broker-data:
  druid-historical-data:
  druid-middlemanager-data:
  druid-router-data:
  spark-master-data:
  spark-worker-1-data:
  spark-worker-2-data:
  airflow-postgres-data:
  airflow-init-marker:

networks:
  default:
    name: ecommerce-network
