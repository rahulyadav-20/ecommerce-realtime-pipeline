# =============================================================================
# Phase 1 — Foundation & Infrastructure
# Services: Kafka (KRaft, 3 brokers) · Schema Registry · Flink · Kafka UI
# Prerequisite: Docker Desktop ≥ 16 GB RAM, 4+ CPUs
#
# Quick start:
#   docker compose -f docker-compose-phase1.yml --env-file .env up -d
#
# Validation:
#   docker compose -f docker-compose-phase1.yml ps
#   curl http://localhost:${FLINK_UI_PORT}/overview    # Flink JM
#   curl http://localhost:${SCHEMA_REGISTRY_PORT}/subjects
#   open http://localhost:${KAFKA_UI_PORT}              # Kafka UI
# =============================================================================

# ---------------------------------------------------------------------------
# Shared anchors
# ---------------------------------------------------------------------------
x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.1
  # KRaft mode — no ZooKeeper dependency
  networks:
    - ecom-net
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list 2>/dev/null || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 30s

x-flink-common: &flink-common
  image: flink:1.19-java17
  environment:
    FLINK_PROPERTIES: |
      jobmanager.rpc.address: flink-jobmanager
      taskmanager.numberOfTaskSlots: ${FLINK_TM_SLOTS:-4}
      execution.checkpointing.interval: ${FLINK_CHECKPOINT_INTERVAL_MS:-30000}
      execution.checkpointing.mode: EXACTLY_ONCE
      state.backend: rocksdb
      state.backend.incremental: true
  networks:
    - ecom-net
  restart: unless-stopped

# ---------------------------------------------------------------------------
# Volumes & Network
# ---------------------------------------------------------------------------
volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:

networks:
  ecom-net:
    driver: bridge

# ===========================================================================
# SERVICES
# ===========================================================================
services:

  # =========================================================================
  # KAFKA — 3 brokers, KRaft mode (no ZooKeeper)
  # Broker-1 → localhost:9092
  # Broker-2 → localhost:9093
  # Broker-3 → localhost:9094
  #
  # KRaft: each broker doubles as a controller — one cluster without ZK overhead.
  # RF=3, min.isr=2: survives one broker failure without producer stalls.
  # =========================================================================
  kafka-1:
    <<: *kafka-common
    hostname: kafka-1
    container_name: kafka-1
    ports:
      - "${KAFKA_BROKER_1_PORT:-9092}:9092"
    environment:
      # KRaft controller + broker
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka-1:29092,CONTROLLER://kafka-1:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Cluster identity — must be the same across all brokers
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
      # Replication & durability
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR:-3}"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR:-3}"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "${KAFKA_MIN_ISR:-2}"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR:-3}"
      KAFKA_MIN_INSYNC_REPLICAS: "${KAFKA_MIN_ISR:-2}"
      KAFKA_NUM_PARTITIONS: "${KAFKA_NUM_PARTITIONS:-12}"
      KAFKA_LOG_RETENTION_HOURS: "${KAFKA_RETENTION_HOURS:-168}"
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # JVM heap — 2 GB per broker as per phase-1 spec
      KAFKA_HEAP_OPTS: "-Xms2g -Xmx2g"
    volumes:
      - kafka1-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-2:
    <<: *kafka-common
    hostname: kafka-2
    container_name: kafka-2
    ports:
      - "${KAFKA_BROKER_2_PORT:-9093}:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka-2:29092,CONTROLLER://kafka-2:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:29092,PLAINTEXT_HOST://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR:-3}"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR:-3}"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "${KAFKA_MIN_ISR:-2}"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR:-3}"
      KAFKA_MIN_INSYNC_REPLICAS: "${KAFKA_MIN_ISR:-2}"
      KAFKA_NUM_PARTITIONS: "${KAFKA_NUM_PARTITIONS:-12}"
      KAFKA_LOG_RETENTION_HOURS: "${KAFKA_RETENTION_HOURS:-168}"
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xms2g -Xmx2g"
    volumes:
      - kafka2-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-3:
    <<: *kafka-common
    hostname: kafka-3
    container_name: kafka-3
    ports:
      - "${KAFKA_BROKER_3_PORT:-9094}:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka-3:29092,CONTROLLER://kafka-3:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-3:29092,PLAINTEXT_HOST://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR:-3}"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR:-3}"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "${KAFKA_MIN_ISR:-2}"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "${KAFKA_REPLICATION_FACTOR:-3}"
      KAFKA_MIN_INSYNC_REPLICAS: "${KAFKA_MIN_ISR:-2}"
      KAFKA_NUM_PARTITIONS: "${KAFKA_NUM_PARTITIONS:-12}"
      KAFKA_LOG_RETENTION_HOURS: "${KAFKA_RETENTION_HOURS:-168}"
      KAFKA_COMPRESSION_TYPE: zstd
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xms2g -Xmx2g"
    volumes:
      - kafka3-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Topic bootstrap — creates the three pipeline topics once all brokers are ready
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating pipeline topics..."

        kafka-topics --bootstrap-server kafka-1:29092 \
          --create --if-not-exists \
          --topic ecommerce.events.raw.v1 \
          --partitions 12 --replication-factor 3 \
          --config retention.ms=604800000 \
          --config compression.type=zstd \
          --config cleanup.policy=delete

        kafka-topics --bootstrap-server kafka-1:29092 \
          --create --if-not-exists \
          --topic ecommerce.events.clean.v1 \
          --partitions 12 --replication-factor 3 \
          --config retention.ms=604800000 \
          --config compression.type=zstd \
          --config cleanup.policy=delete

        kafka-topics --bootstrap-server kafka-1:29092 \
          --create --if-not-exists \
          --topic dlq.events \
          --partitions 4 --replication-factor 3 \
          --config retention.ms=604800000 \
          --config cleanup.policy=delete

        echo "Topics created:"
        kafka-topics --bootstrap-server kafka-1:29092 --list
    networks:
      - ecom-net

  # =========================================================================
  # SCHEMA REGISTRY — FULL_TRANSITIVE compatibility
  # → http://localhost:8081
  # =========================================================================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 3
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "${SCHEMA_REGISTRY_COMPAT:-FULL_TRANSITIVE}"
      SCHEMA_REGISTRY_KAFKASTORE_TIMEOUT_MS: "60000"
      SCHEMA_REGISTRY_KAFKASTORE_INIT_TIMEOUT_MS: "120000"
    restart: unless-stopped
    networks:
      - ecom-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # =========================================================================
  # APACHE FLINK 1.19 — ETL engine
  # Job Manager UI → http://localhost:8082
  # 2 Task Managers × 4 slots = 8 total slots
  # Phase-1 spec: 4 GB per TM
  # =========================================================================
  flink-jobmanager:
    <<: *flink-common
    hostname: flink-jobmanager
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "${FLINK_UI_PORT:-8082}:8081"
    deploy:
      resources:
        limits:
          memory: 1g
    volumes:
      - ../flink-app:/opt/flink/usrlib
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  flink-taskmanager-1:
    <<: *flink-common
    hostname: flink-taskmanager-1
    container_name: flink-taskmanager-1
    command: taskmanager
    # Phase-1 target: 4 GB per TM (requires Docker Desktop ≥ 16 GB)
    deploy:
      resources:
        limits:
          memory: 4g
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  flink-taskmanager-2:
    <<: *flink-common
    hostname: flink-taskmanager-2
    container_name: flink-taskmanager-2
    command: taskmanager
    deploy:
      resources:
        limits:
          memory: 4g
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  # =========================================================================
  # KAFKA UI — http://localhost:8085
  # Covers: brokers · topics · consumer groups · schema registry
  # =========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      schema-registry:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8085}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecom-phase1
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"
    restart: unless-stopped
    networks:
      - ecom-net
