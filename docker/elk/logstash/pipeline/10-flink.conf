# =============================================================================
# 10-flink.conf — Flink log parsing pipeline
# =============================================================================
#
# SINGLE-PIPELINE ARCHITECTURE
# ─────────────────────────────
# Logstash loads all *.conf files from the pipeline directory in alphabetical
# order and merges them into ONE logical pipeline:
#
#   10-flink.conf    → input (shared) + Flink filter + Flink output
#   11-kafka.conf    → Kafka filter + Kafka output
#   12-clickhouse.conf → ClickHouse filter + ClickHouse output
#   20-metrics.conf  → Metricbeat filter + Metricbeat output
#
# The shared `input {}` block below is declared ONLY here.
# All four filter blocks run in alphabetical order; each is guarded by an
# `if` condition so events from other services pass through unchanged.
#
# FLINK LOG FORMAT (Log4j2 default pattern in Flink 1.19)
# ─────────────────────────────────────────────────────────
#   %d{yyyy-MM-dd HH:mm:ss,SSS} %-5level [%t] %c{1} %marker- %msg%n
#
# Example:
#   2026-05-11 14:32:10,421 INFO  [flink-scheduler-main] CheckpointCoordinator [] - Triggering checkpoint 42 @ 1715434330421 for job aabbccdd11223344.
#   2026-05-11 14:32:18,001 ERROR [Source: kafka (1/4)] KafkaConsumerThread [] - Error in KafkaConsumerThread
#       java.lang.RuntimeException: Connection refused
#           at org.apache.kafka.clients...
#
# FLINK LOG4J JSON FORMAT (optional, if JsonLayout is configured)
# ───────────────────────────────────────────────────────────────
#   {"instant":{"epochSecond":...},"level":"INFO","loggerName":"...","message":"..."}
#
# Both formats are handled: JSON is detected by the leading `{` character.
# =============================================================================

# -----------------------------------------------------------------------------
# INPUT — Shared across all 4 pipeline files.
# Filebeat ships container stdout/stderr from all pipeline services.
# Metricbeat ships metrics events (handled in 20-metrics.conf).
# -----------------------------------------------------------------------------
input {
  beats {
    port => 5044
    # Enable TLS in production. For local dev, plain TCP is fine.
    # ssl => true
    # ssl_certificate => "/etc/logstash/certs/logstash.crt"
    # ssl_key         => "/etc/logstash/certs/logstash.key"
  }
}

# -----------------------------------------------------------------------------
# FILTER — Flink events only
# Detection: container.name matches "flink" OR fields.service starts with "flink"
# -----------------------------------------------------------------------------
filter {

  if [container][name] =~ /flink/ or [fields][service] =~ /^flink/ {

    # ── Tag for downstream routing ──────────────────────────────────────────
    mutate {
      add_field => { "[@metadata][service]" => "flink" }
      add_tag   => ["flink"]
    }

    # ── Determine Flink role from container name ─────────────────────────────
    # Sets flink.role: jobmanager | taskmanager
    if [container][name] =~ /jobmanager/ or [fields][service] =~ /jobmanager/ {
      mutate { add_field => { "[flink][role]" => "jobmanager" } }
    } else if [container][name] =~ /taskmanager/ or [fields][service] =~ /taskmanager/ {
      mutate { add_field => { "[flink][role]" => "taskmanager" } }
    }

    # ── Branch: JSON log format ──────────────────────────────────────────────
    # Flink emits JSON when Log4j2 is configured with JsonTemplateLayout.
    # Detected by the message starting with `{`.
    if [message] =~ /^\{/ {

      json {
        source => "message"
        target => "flink_json"
        tag_on_failure => ["_jsonparsefailure_flink"]
      }

      if !("_jsonparsefailure_flink" in [tags]) {
        # Map standard JSON fields to ECS
        mutate {
          rename => {
            "[flink_json][level]"      => "[log][level]"
            "[flink_json][loggerName]" => "[log][logger]"
            "[flink_json][message]"    => "[log][message]"
            "[flink_json][thread]"     => "[thread][name]"
          }
          copy => { "[flink_json][message]" => "message" }
        }

        # Parse ISO-8601 timestamp from JSON
        if [flink_json][instant][epochSecond] {
          ruby {
            code => "
              epoch_sec  = event.get('[flink_json][instant][epochSecond]').to_i
              epoch_nano = event.get('[flink_json][instant][nanoOfSecond]').to_i
              event.set('@timestamp', LogStash::Timestamp.at(epoch_sec, epoch_nano / 1000))
            "
          }
        }

        # Extract job context from JSON MDC (Mapped Diagnostic Context)
        if [flink_json][mdc] {
          mutate {
            rename => {
              "[flink_json][mdc][jobId]"       => "[flink][job_id]"
              "[flink_json][mdc][attemptId]"   => "[flink][attempt_id]"
              "[flink_json][mdc][taskName]"    => "[flink][task_name]"
              "[flink_json][mdc][subtaskIndex]"=> "[flink][subtask_index]"
            }
          }
        }

        mutate { remove_field => ["flink_json"] }
      }

    # ── Branch: Text log format (Log4j2 pattern) ─────────────────────────────
    } else {

      grok {
        match => {
          "message" => [
            # Standard Flink Log4j2 pattern with MDC block [] between logger and dash
            "%{TIMESTAMP_ISO8601:log_ts}%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}+\[%{DATA:[thread][name]}\]%{SPACE}%{DATA:[log][logger]}%{SPACE}(?:\[%{DATA:[flink][mdc]}\]%{SPACE})?-%{SPACE}%{GREEDYDATA:[log][message]}",
            # Fallback — capture at least timestamp and level
            "%{TIMESTAMP_ISO8601:log_ts}%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}+%{GREEDYDATA:[log][message]}"
          ]
        }
        tag_on_failure => ["_grokparsefailure_flink_text"]
      }

      if !("_grokparsefailure_flink_text" in [tags]) {
        date {
          match   => ["log_ts", "yyyy-MM-dd HH:mm:ss,SSS"]
          target  => "@timestamp"
          timezone => "UTC"
        }
        mutate { remove_field => ["log_ts"] }
      }

      # ── Thread-name task extraction ────────────────────────────────────────
      # Flink names threads after the operator: "Source: kafka (1/4)"
      # Extract the task name and parallelism from the thread name.
      if [thread][name] {
        grok {
          match => {
            "[thread][name]" => "(?<[flink][task_name]>[^(]+?)\s*\((?<[flink][subtask_index]>\d+)/(?<[flink][parallelism]>\d+)\)"
          }
          tag_on_failure => []    # silence — not all threads follow this pattern
        }
      }

    } # end text vs JSON branch

    # ── Extract job_id, checkpoint_id from message ───────────────────────────
    # These appear in log messages regardless of JSON/text format.
    if [log][message] or [message] {
      grok {
        match => {
          "message" => [
            # "job aabbccdd00112233" — 32-char hex
            "(?:job\s+|JobID\s*)(?<[flink][job_id]>[0-9a-f]{32})",
            # "checkpoint 42"
            "(?:checkpoint|Checkpoint)\s+(?<[flink][checkpoint_id]>\d+)",
            # Operator name in task failure messages
            "(?:task\s+|Task\s+)?'(?<[flink][task_name]>[^']{3,64})'"
          ]
        }
        # Apply all patterns independently — partial matches are fine
        break_on_match => false
        tag_on_failure => []
      }
    }

    # ── Checkpoint-specific tags for alerting ───────────────────────────────
    if [log][message] =~ /(?i)checkpoint.*fail|failed to complete|declined|abort/ {
      mutate { add_tag => ["checkpoint_failure"] }
    }
    if [log][message] =~ /(?i)triggering checkpoint/ {
      mutate { add_tag => ["checkpoint_triggered"] }
    }

    # ── Backpressure detection ───────────────────────────────────────────────
    if [log][message] =~ /(?i)backpressur|slow buffer/ {
      mutate { add_tag => ["backpressure"] }
    }

    # ── Watermark lag extraction ─────────────────────────────────────────────
    if [log][message] =~ /(?i)watermark/ {
      grok {
        match => { "message" => "watermark\s+(?<[flink][watermark_ms]-?\d+)" }
        tag_on_failure => []
      }
    }

    # ── Normalize log.level to lowercase ECS ────────────────────────────────
    if [log][level] {
      mutate { lowercase => ["[log][level]"] }
    }

    # ── Tag application errors for alerting ─────────────────────────────────
    if [log][level] in ["error", "fatal"] {
      mutate { add_tag => ["application_error"] }
    }

  } # end if flink

} # end filter

# -----------------------------------------------------------------------------
# OUTPUT — Flink events → daily index
# Other events pass through (handled by 11-, 12-, 20- output blocks).
# -----------------------------------------------------------------------------
output {

  if "flink" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "logs-flink-%{+YYYY.MM.dd}"
      # Retry on conflict (e.g. duplicate events from Kafka at-least-once)
      retry_on_conflict => 3
      # Action type — "create" avoids overwriting; "index" allows updates
      action => "index"
    }
  }

}
