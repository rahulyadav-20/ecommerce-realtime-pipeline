# =============================================================================
# 20-metrics.conf â€” Metricbeat metrics routing pipeline
# =============================================================================
#
# NOTE: No `input {}` block here. The shared Beats input is in 10-flink.conf.
#
# WHAT THIS PIPELINE DOES
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Metricbeat ships structured metric events â€” not text logs â€” via the Beats
# protocol. Unlike Filebeat log events (which have a `message` string to parse),
# Metricbeat events already contain typed fields in nested objects.
#
# This pipeline:
#   1. Detects Metricbeat events by `agent.type == "metricbeat"`
#   2. Routes each module's events to the correct Elasticsearch index:
#        system.* + docker.*        â†’ metricbeat-YYYY.MM.dd
#        flink.*                    â†’ metricbeat-flink-YYYY.MM.dd
#        kafka.*                    â†’ metricbeat-kafka-YYYY.MM.dd
#        clickhouse (prometheus)    â†’ metricbeat-clickhouse-YYYY.MM.dd
#        minio (prometheus)         â†’ metricbeat-minio-YYYY.MM.dd
#        kafka_connect.*            â†’ metricbeat-connect-YYYY.MM.dd
#   3. Enriches each event with a `metrics_type` field for easy dashboarding
#   4. Applies threshold tags for alerting (Kibana alerting uses these tags)
#
# METRICBEAT EVENT IDENTIFICATION
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Metricbeat events carry these routing fields:
#   agent.type            = "metricbeat"
#   event.module          = "system" | "docker" | "kafka" | "http" | "prometheus"
#   event.dataset         = "system.cpu" | "docker.container" | etc.
#   [http][json][flink]   = Flink REST API response (namespace: flink.overview)
#   [http][json][kafka]   = Kafka Connect REST response
#   [prometheus][*]       = ClickHouse / MinIO Prometheus metrics
#
# THRESHOLD ALERTS (tags added here, consumed by Kibana alerting rules)
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
#   alert_high_cpu        â€” system CPU user% > 80
#   alert_high_memory     â€” system memory used% > 85
#   alert_kafka_lag       â€” kafka consumer group lag > 10 000
#   alert_flink_jobs_zero â€” Flink has 0 running jobs
#   alert_ch_memory       â€” ClickHouse memory_usage > 3.5 GB (of 4 GB limit)
# =============================================================================

filter {

  # â”€â”€ Gate: Metricbeat events only â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  if [agent][type] == "metricbeat" {

    mutate {
      add_field => { "[@metadata][service]" => "metricbeat" }
      add_tag   => ["metricbeat"]
    }

    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # MODULE: system â€” host CPU, memory, disk, network
    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [event][module] == "system" {
      mutate {
        add_field => { "[metrics_type]" => "system" }
        add_tag   => ["metrics_system"]
      }

      # High CPU alert: user + system CPU % > 80
      if [system][cpu][user][pct] {
        ruby {
          code => "
            user_pct = event.get('[system][cpu][user][pct]').to_f * 100
            sys_pct  = event.get('[system][cpu][system][pct]').to_f * 100
            if (user_pct + sys_pct) > 80.0
              event.tag('alert_high_cpu')
              event.set('[alert][cpu_total_pct]', user_pct + sys_pct)
            end
          "
        }
      }

      # High memory alert: used% > 85
      if [system][memory][used][pct] {
        ruby {
          code => "
            used_pct = event.get('[system][memory][used][pct]').to_f * 100
            if used_pct > 85.0
              event.tag('alert_high_memory')
              event.set('[alert][memory_used_pct]', used_pct)
            end
          "
        }
      }
    }

    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # MODULE: docker â€” per-container resource usage
    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [event][module] == "docker" {
      mutate {
        add_field => { "[metrics_type]" => "docker" }
        add_tag   => ["metrics_docker"]
      }

      # Enrich with service classification based on container name
      if [container][name] =~ /flink/ {
        mutate { add_field => { "[pipeline_service]" => "flink" } }
      } else if [container][name] =~ /kafka/ {
        mutate { add_field => { "[pipeline_service]" => "kafka" } }
      } else if [container][name] =~ /clickhouse/ {
        mutate { add_field => { "[pipeline_service]" => "clickhouse" } }
      } else if [container][name] =~ /druid/ {
        mutate { add_field => { "[pipeline_service]" => "druid" } }
      } else if [container][name] =~ /minio/ {
        mutate { add_field => { "[pipeline_service]" => "minio" } }
      } else if [container][name] =~ /elasticsearch|kibana|logstash/ {
        mutate { add_field => { "[pipeline_service]" => "elk" } }
      }
    }

    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # MODULE: kafka â€” consumer group lag, partition metrics
    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [event][module] == "kafka" {
      mutate {
        add_field => { "[metrics_type]" => "kafka" }
        add_tag   => ["metrics_kafka"]
      }

      # Consumer lag alert: lag > 10 000 events per partition
      if [kafka][consumer_group][consumer_lag] {
        ruby {
          code => "
            lag = event.get('[kafka][consumer_group][consumer_lag]').to_i
            if lag > 10000
              event.tag('alert_kafka_lag')
              event.set('[alert][consumer_lag]', lag)
            end
          "
        }
      }

      # Tag the pipeline topic
      if [kafka][partition][topic_name] =~ /ecommerce\.events/ {
        mutate { add_tag => ["pipeline_topic"] }
      }
    }

    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # MODULE: http/json â€” Flink REST API metrics
    # Metricbeat's http module fetches Flink REST JSON and nests it under
    # [http][json] with the namespace set in metricbeat.yml.
    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [event][module] == "http" and [http][json][flink] {
      mutate {
        add_field => { "[metrics_type]" => "flink" }
        add_tag   => ["metrics_flink"]
      }

      # Flatten key Flink overview fields for dashboards
      if [http][json][flink][overview] {
        ruby {
          code => "
            overview = event.get('[http][json][flink][overview]')
            if overview
              event.set('[flink][running_jobs]',           overview['jobs-running'] || 0)
              event.set('[flink][finished_jobs]',          overview['jobs-finished'] || 0)
              event.set('[flink][failed_jobs]',            overview['jobs-failed'] || 0)
              event.set('[flink][task_managers]',          overview['taskmanagers'] || 0)
              event.set('[flink][slots_total]',            overview['slots-total'] || 0)
              event.set('[flink][slots_available]',        overview['slots-available'] || 0)
            end
          "
        }
      }

      # Alert: no running Flink jobs (pipeline may be down)
      if [flink][running_jobs] and [flink][running_jobs] == 0 {
        mutate { add_tag => ["alert_flink_jobs_zero"] }
      }
    }

    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # MODULE: prometheus â€” ClickHouse metrics
    # ClickHouse exposes Prometheus metrics at :8123/metrics.
    # Metricbeat scrapes them and nests under [prometheus].
    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [event][module] == "prometheus" and [host][name] =~ /clickhouse/ {
      mutate {
        add_field => { "[metrics_type]" => "clickhouse" }
        add_tag   => ["metrics_clickhouse"]
      }

      # Extract key ClickHouse metrics from prometheus labels/values
      # Note: Prometheus metric names use underscores in Logstash field names
      if [prometheus][metrics][ClickHouseMetrics_Memory] {
        ruby {
          code => "
            memory_bytes = event.get('[prometheus][metrics][ClickHouseMetrics_Memory]').to_i
            memory_gb    = (memory_bytes.to_f / (1024**3)).round(2)
            event.set('[clickhouse][memory_usage_bytes]', memory_bytes)
            event.set('[clickhouse][memory_usage_gb]',    memory_gb)
            # Alert if > 3.5 GB (of 4 GB limit configured in config.xml)
            if memory_gb > 3.5
              event.tag('alert_ch_memory')
              event.set('[alert][ch_memory_gb]', memory_gb)
            end
          "
        }
      }

      if [prometheus][metrics][ClickHouseProfileEvents_Query] {
        mutate {
          copy => { "[prometheus][metrics][ClickHouseProfileEvents_Query]" => "[clickhouse][query_count]" }
        }
      }

      if [prometheus][metrics][ClickHouseProfileEvents_InsertQuery] {
        mutate {
          copy => { "[prometheus][metrics][ClickHouseProfileEvents_InsertQuery]" => "[clickhouse][insert_count]" }
        }
      }
    }

    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # MODULE: prometheus â€” MinIO metrics
    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [event][module] == "prometheus" and [host][name] =~ /minio/ {
      mutate {
        add_field => { "[metrics_type]" => "minio" }
        add_tag   => ["metrics_minio"]
      }

      if [prometheus][metrics][minio_s3_requests_total] {
        mutate {
          copy => { "[prometheus][metrics][minio_s3_requests_total]" => "[minio][s3_requests_total]" }
        }
      }

      if [prometheus][metrics][minio_s3_errors_total] {
        mutate {
          copy => { "[prometheus][metrics][minio_s3_errors_total]" => "[minio][s3_errors_total]" }
        }
      }
    }

    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # MODULE: http/json â€” Kafka Connect metrics
    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [event][module] == "http" and [http][json][kafka_connect] {
      mutate {
        add_field => { "[metrics_type]" => "kafka_connect" }
        add_tag   => ["metrics_kafka_connect"]
      }
    }

    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Common: set index prefix in metadata for routing
    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [metrics_type] in ["flink"] {
      mutate { add_field => { "[@metadata][metrics_index]" => "metricbeat-flink" } }
    } else if [metrics_type] == "kafka" {
      mutate { add_field => { "[@metadata][metrics_index]" => "metricbeat-kafka" } }
    } else if [metrics_type] == "clickhouse" {
      mutate { add_field => { "[@metadata][metrics_index]" => "metricbeat-clickhouse" } }
    } else if [metrics_type] == "minio" {
      mutate { add_field => { "[@metadata][metrics_index]" => "metricbeat-minio" } }
    } else if [metrics_type] == "kafka_connect" {
      mutate { add_field => { "[@metadata][metrics_index]" => "metricbeat-connect" } }
    } else {
      # system, docker, and all others â†’ default metricbeat index
      mutate { add_field => { "[@metadata][metrics_index]" => "metricbeat" } }
    }

  } # end if metricbeat

} # end filter

# -----------------------------------------------------------------------------
# OUTPUT â€” route metrics to per-service indices
# Log events (Flink, Kafka, ClickHouse) are handled by 10-, 11-, 12- outputs.
# This output handles ONLY Metricbeat events.
# -----------------------------------------------------------------------------
output {

  if "metricbeat" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      # Use metadata set above: metricbeat-{service}-YYYY.MM.dd
      index => "%{[@metadata][metrics_index]}-%{+YYYY.MM.dd}"
      retry_on_conflict => 3
      action => "index"

      # Metricbeat uses a specific index template; do NOT let Logstash
      # override the template that Metricbeat itself registers.
      manage_template => false
    }
  }

}
