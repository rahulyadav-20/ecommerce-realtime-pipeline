# =============================================================================
# 11-kafka.conf â€” Kafka broker log parsing pipeline
# =============================================================================
#
# NOTE: No `input {}` block here. The shared Beats input is declared in
# 10-flink.conf and applies to the entire merged pipeline.
#
# KAFKA LOG FORMATS
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Kafka 3.x uses Log4j2 (same as Flink) with two common patterns:
#
# Pattern 1 â€” server.log (standard):
#   [2026-05-11 14:32:10,421] INFO  [QuorumController id=1] ... (kafka.controller.KafkaController)
#
# Pattern 2 â€” state-change.log / controller.log:
#   [2026-05-11 14:32:10,421] TRACE [Controller id=1 epoch=42] ... (state.change.logger)
#
# Pattern 3 â€” request.log (access log style):
#   [2026-05-11 14:32:10,421] TRACE [RequestId:abc123] ... (kafka.request.logger)
#
# Key fields extracted:
#   broker_id   â€” broker / controller ID
#   topic       â€” Kafka topic name
#   partition   â€” partition number
#   leader_id   â€” leader broker for the partition
#   offset      â€” last stable offset or high-water mark
#
# KAFKA GROK REFERENCE
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
#  Timestamp :  \[%{TIMESTAMP_ISO8601:log_ts}\]
#  Level     :  %{LOGLEVEL:[log][level]}
#  Thread    :  \[%{DATA:[thread][name]}\]
#  Message   :  %{GREEDYDATA:[log][message]}
#  Logger    :  \(%{DATA:[log][logger]}\)
# =============================================================================

filter {

  if [container][name] =~ /kafka/ and [container][name] !~ /kafka-connect|kafka-ui|schema-registry/ {

    # â”€â”€ Service tag â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    mutate {
      add_field => { "[@metadata][service]" => "kafka" }
      add_tag   => ["kafka"]
    }

    # â”€â”€ Detect broker ID from container name â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Container names: kafka-1, kafka-2
    grok {
      match => { "[container][name]" => "kafka-(?<kafka_broker_id>\d+)" }
      tag_on_failure => []
    }

    # â”€â”€ Parse Kafka Log4j2 text format â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    grok {
      match => {
        "message" => [
          # Standard format: [timestamp] LEVEL [thread] message (logger)
          "\[%{TIMESTAMP_ISO8601:log_ts}\]%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}+\[%{DATA:[thread][name]}\]%{SPACE}%{GREEDYDATA:[log][message]}%{SPACE}\(%{DATA:[log][logger]}\)",

          # Fallback: [timestamp] LEVEL message (logger)
          "\[%{TIMESTAMP_ISO8601:log_ts}\]%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}+%{GREEDYDATA:[log][message]}%{SPACE}\(%{DATA:[log][logger]}\)",

          # Minimal fallback
          "\[%{TIMESTAMP_ISO8601:log_ts}\]%{SPACE}%{LOGLEVEL:[log][level]}%{SPACE}+%{GREEDYDATA:[log][message]}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_kafka"]
    }

    if !("_grokparsefailure_kafka" in [tags]) {
      date {
        match   => ["log_ts", "yyyy-MM-dd HH:mm:ss,SSS", "ISO8601"]
        target  => "@timestamp"
        timezone => "UTC"
      }
      mutate { remove_field => ["log_ts"] }
    }

    # â”€â”€ Extract broker/controller ID from thread name â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Thread names: "QuorumController id=1", "Replica-Fetcher-2", "Controller id=1 epoch=42"
    if [thread][name] {
      grok {
        match => {
          "[thread][name]" => [
            # QuorumController id=N
            "(?:QuorumController|Controller)\s+id=(?<kafka_controller_id>\d+)",
            # Replica-Fetcher-thread-M
            "Replica-Fetcher.*?-(?<kafka_broker_id>\d+)$"
          ]
        }
        break_on_match => false
        tag_on_failure => []
      }
    }

    # â”€â”€ Extract topic, partition, offset from log message â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Examples:
    #   "LeaderEpoch 0 for topic ecommerce.events.raw.v1 partition 0"
    #   "Append messages to local log ecommerce.events.raw.v1-0"
    #   "Scheduling log segment [baseOffset 0, size 1024]"
    if [log][message] {
      grok {
        match => {
          "[log][message]" => [
            # "topic xyz-topic partition 0"
            "(?:topic|Topic)\s+(?<kafka_topic>[a-zA-Z0-9._-]+)\s+(?:partition|Partition)\s+(?<kafka_partition>\d+)",

            # "topic-name-N" (combined topic-partition shorthand)
            "(?<kafka_topic_short>[a-zA-Z][a-zA-Z0-9._-]*)-(?<kafka_partition_short>\d+)\b",

            # leader.id=N or leaderId=N
            "(?:leader\.?[Ii]d|Leader\.?[Ii]d)\s*[=:]\s*(?<kafka_leader_id>\d+)",

            # high watermark or LSO offset
            "(?:high.?watermark|highWatermark|lastStableOffset|LSO)\s*[=:]\s*(?<kafka_offset>\d+)"
          ]
        }
        break_on_match => false   # try all patterns, collect all matches
        tag_on_failure => []
      }
    }

    # â”€â”€ Consumer group extraction â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # "Consumer group clickhouse-ecom-events committed offset 1024 for partition 0"
    if [log][message] =~ /(?i)consumer.?group|group.?id/ {
      grok {
        match => {
          "[log][message]" => "(?:consumer.group|group.id|groupId)\s*[=:'\"]?\s*(?<kafka_consumer_group>[a-zA-Z0-9._-]+)"
        }
        tag_on_failure => []
      }
    }

    # â”€â”€ Under-replicated partition alerts â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [log][message] =~ /(?i)under.?replicated|under-replicated|ISR/ {
      mutate { add_tag => ["under_replicated_partitions"] }
    }

    # â”€â”€ Leader election events â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [log][message] =~ /(?i)leader\s+(?:election|elected|became|change)/ {
      mutate { add_tag => ["leader_election"] }
    }

    # â”€â”€ Out-of-sync replica alerts â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [log][message] =~ /(?i)out.of.sync|shrinking ISR|expanding ISR/ {
      mutate { add_tag => ["isr_change"] }
    }

    # â”€â”€ Normalize log.level â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    if [log][level] { mutate { lowercase => ["[log][level]"] } }
    if [log][level] in ["error", "fatal"] {
      mutate { add_tag => ["application_error"] }
    }

  } # end if kafka

} # end filter

output {

  if "kafka" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "logs-kafka-%{+YYYY.MM.dd}"
      retry_on_conflict => 3
      action => "index"
    }
  }

}
