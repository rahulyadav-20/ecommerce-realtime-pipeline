# =============================================================================
# 12-clickhouse.conf — ClickHouse log parsing pipeline
# =============================================================================
#
# NOTE: No `input {}` block here. The shared Beats input is in 10-flink.conf.
#
# CLICKHOUSE LOG FORMAT
# ──────────────────────
# ClickHouse uses a space-delimited text log format:
#
#   2026.05.11 14:32:10.421001 [ 1234 ] {query-id-or-empty} <Level> Context: message
#
# Field breakdown:
#   Date.Time.microseconds  →  timestamp (UTC)
#   [ thread_id ]           →  OS thread ID (not a name)
#   {query_id}              →  Query UUID or empty {}
#   <Level>                 →  Log level: Trace Debug Information Warning Error Fatal
#   Context                 →  C++ class / subsystem name (no trailing colon in all lines)
#   message                 →  Free-form message
#
# Examples:
#   2026.05.11 14:32:10.421001 [ 12 ] {} <Information> Application: Starting ClickHouse
#   2026.05.11 14:32:10.422001 [ 34 ] {7f1a2b3c-4d5e-6f7a-8b9c-0d1e2f3a4b5c} <Debug> executeQuery: (from 172.20.0.1:59472, using production parser) SELECT 1
#   2026.05.11 14:32:10.500001 [ 56 ] {7f1a2b3c-...} <Warning> MergeTreeDataWriter: Wrote 10000 rows in 0.042 sec., 1000000 bytes. (238095 rows/sec., 23809523.81 b/sec.)
#   2026.05.11 14:32:10.601001 [ 78 ] {7f1a2b3c-...} <Error> DB::Exception: Cannot read from file /var/lib/clickhouse/...
#
# MULTILINE (stack traces)
# ─────────────────────────
# ClickHouse C++ stack traces follow the pattern:
#   DB::Exception: ... (in main format line)
#   Stack trace:
#   0. ./clickhouse (...)
#   1. ./clickhouse (...)
#
# Filebeat handles multiline merging before shipping (configured in filebeat.yml).
# Logstash receives already-merged events — no multiline filter needed here.
# If Filebeat multiline is NOT configured, add a multiline filter:
#
#   multiline {
#     pattern     => "^\d{4}\.\d{2}\.\d{2}"
#     negate      => true
#     what        => "previous"
#     max_lines   => 200
#     timeout     => "5 seconds"
#   }
#
# KEY FIELDS EXTRACTED
# ──────────────────────
#   clickhouse.thread_id   — OS thread ID
#   clickhouse.query_id    — Query UUID (empty for non-query messages)
#   clickhouse.context     — Subsystem / class name
#   clickhouse.query_text  — SQL text (from executeQuery messages)
#   clickhouse.rows        — Rows written/read (from MergeTree messages)
#   clickhouse.elapsed_ms  — Query elapsed time in milliseconds
#   clickhouse.database    — Database name (from DDL or query context)
#   clickhouse.table       — Table name
# =============================================================================

filter {

  if [container][name] =~ /clickhouse/ and [container][name] !~ /clickhouse-ui|ch-ui/ {

    # ── Service tag ─────────────────────────────────────────────────────────
    mutate {
      add_field => { "[@metadata][service]" => "clickhouse" }
      add_tag   => ["clickhouse"]
    }

    # ── Primary grok: full ClickHouse log format ─────────────────────────────
    grok {
      match => {
        "message" => [
          # Full format with query_id
          "(?<log_ts>%{YEAR}\.%{MONTHNUM}\.%{MONTHDAY} %{TIME})\.\d+ \[ (?<[clickhouse][thread_id]>\d+) \] \{(?<[clickhouse][query_id]>[^}]*)\} <%{DATA:[log][level]}> (?<[clickhouse][context]>[^:]+): %{GREEDYDATA:[log][message]}",

          # Format without the query_id braces (some versions omit empty {})
          "(?<log_ts>%{YEAR}\.%{MONTHNUM}\.%{MONTHDAY} %{TIME})\.\d+ \[ (?<[clickhouse][thread_id]>\d+) \] <%{DATA:[log][level]}> (?<[clickhouse][context]>[^:]+): %{GREEDYDATA:[log][message]}",

          # Minimal fallback — capture at least timestamp + level
          "(?<log_ts>%{YEAR}\.%{MONTHNUM}\.%{MONTHDAY} %{TIME})\.\d+%{SPACE}<%{DATA:[log][level]}>%{SPACE}%{GREEDYDATA:[log][message]}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_clickhouse"]
    }

    if !("_grokparsefailure_clickhouse" in [tags]) {
      date {
        # ClickHouse timestamp: 2026.05.11 14:32:10 (micro-seconds stripped by grok)
        match   => ["log_ts", "yyyy.MM.dd HH:mm:ss"]
        target  => "@timestamp"
        timezone => "UTC"
      }
      mutate { remove_field => ["log_ts"] }
    }

    # ── Normalize ClickHouse log levels to ECS lowercase ─────────────────────
    # ClickHouse uses: Trace Debug Information Warning Error Fatal
    if [log][level] {
      mutate { lowercase => ["[log][level]"] }
      # "information" → "info"
      if [log][level] == "information" {
        mutate { replace => { "[log][level]" => "info" } }
      }
    }

    # ── Extract query SQL text ────────────────────────────────────────────────
    # ClickHouse logs the full SQL when a query starts:
    #   executeQuery: (from 172.20.0.1:59472, ...) SELECT count() FROM ecom.events_local
    if [clickhouse][context] =~ /executeQuery|InterpreterSelectQuery/ {
      grok {
        match => {
          "[log][message]" => "\(from\s+%{IP:[client][ip]}:%{POSINT:[client][port]},?[^)]*\)\s+%{GREEDYDATA:[clickhouse][query_text]}"
        }
        tag_on_failure => []
      }
      # Tag long queries (SQL > 500 chars → likely a complex analytical query)
      if [clickhouse][query_text] and [clickhouse][query_text] =~ /.{500}/ {
        mutate { add_tag => ["complex_query"] }
      }
    }

    # ── Extract query elapsed time ────────────────────────────────────────────
    # "Read 10000 rows, 1.23 MiB in 0.042 sec., ..."
    # "Processed 10000 rows, 1.23 MiB in 0.042 sec."
    if [log][message] =~ /(?i)in \d+\.\d+ sec/ {
      grok {
        match => {
          "[log][message]" => "in (?<elapsed_sec>\d+\.\d+) sec"
        }
        tag_on_failure => []
      }
      if [elapsed_sec] {
        ruby {
          code => "
            elapsed = event.get('elapsed_sec').to_f
            event.set('[clickhouse][elapsed_ms]', (elapsed * 1000).round)
          "
        }
        mutate { remove_field => ["elapsed_sec"] }
        # Tag slow queries (> 5 seconds)
        if [clickhouse][elapsed_ms] and [clickhouse][elapsed_ms] > 5000 {
          mutate { add_tag => ["slow_query"] }
        }
      }
    }

    # ── Extract rows written / read (MergeTree operations) ──────────────────
    # "Wrote 10000 rows in 0.042 sec."
    # "Merged 500000 rows, 48.83 MiB in 2.01 sec."
    if [log][message] =~ /(?i)(?:wrote|merged|read|processed)\s+\d+ rows/ {
      grok {
        match => {
          "[log][message]" => "(?:wrote|Wrote|merged|Merged|read|Read|processed|Processed)\s+(?<[clickhouse][rows]>\d+)\s+rows"
        }
        tag_on_failure => []
      }
    }

    # ── Extract table / database from message ─────────────────────────────────
    # "Merging tmp parts in table ecom.events_local"
    # "Creating table ecom.kpi_1min"
    # "Renaming temporary part ... in table ecom.funnel_5min"
    if [log][message] =~ /(?i)table |database / {
      grok {
        match => {
          "[log][message]" => [
            # "table ecom.events_local" → database=ecom, table=events_local
            "table\s+(?<[clickhouse][database]>[a-zA-Z_][a-zA-Z0-9_]*)\.(?<[clickhouse][table]>[a-zA-Z_][a-zA-Z0-9_]*)",
            # "database ecom"
            "database\s+(?<[clickhouse][database]>[a-zA-Z_][a-zA-Z0-9_]*)"
          ]
        }
        break_on_match => false
        tag_on_failure => []
      }
    }

    # ── Kafka engine messages ─────────────────────────────────────────────────
    # "StorageKafka (ecom.events_kafka): Started streaming to 4 consumers"
    if [clickhouse][context] =~ /(?i)kafka/ or [log][message] =~ /(?i)StorageKafka/ {
      mutate { add_tag => ["clickhouse_kafka"] }
      grok {
        match => {
          "[log][message]" => "(?:streaming to|consumers running:)\s+(?<[clickhouse][kafka_consumers]>\d+)"
        }
        tag_on_failure => []
      }
    }

    # ── Materialized view refresh messages ───────────────────────────────────
    if [log][message] =~ /(?i)materialized.*view|MV insert/ {
      mutate { add_tag => ["materialized_view"] }
    }

    # ── ReplacingMergeTree deduplicate messages ──────────────────────────────
    if [log][message] =~ /(?i)replacing.*duplicate|removing.*duplicate/ {
      mutate { add_tag => ["deduplication"] }
    }

    # ── Exception detection ───────────────────────────────────────────────────
    # ClickHouse exceptions always start with "DB::Exception:"
    if [log][message] =~ /DB::Exception/ or [log][level] == "error" {
      mutate { add_tag => ["application_error"] }
      grok {
        match => {
          "[log][message]" => "DB::Exception:\s+(?<[clickhouse][exception_message]>[^(]+)"
        }
        tag_on_failure => []
      }
    }

    # ── Stack trace detection ─────────────────────────────────────────────────
    # ClickHouse stack traces look like: "0. ./clickhouse (foo+0x123)"
    if [log][message] =~ /Stack trace:|^\s*\d+\.\s+\.\// {
      mutate { add_tag => ["stack_trace"] }
    }

  } # end if clickhouse

} # end filter

output {

  if "clickhouse" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "logs-clickhouse-%{+YYYY.MM.dd}"
      retry_on_conflict => 3
      action => "index"
    }
  }

}
