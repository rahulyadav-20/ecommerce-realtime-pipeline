input {
  beats {
    port => 5044
  }
}

filter {
  if [fields][service] {
    mutate { add_field => { "[@metadata][index_prefix]" => "logs-%{[fields][service]}" } }
  } else {
    mutate { add_field => { "[@metadata][index_prefix]" => "logs-generic" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
  }
}
