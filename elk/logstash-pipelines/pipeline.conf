# =============================================================================
# pipeline.conf — Logstash pipeline for the ecom real-time pipeline
#
# Flow:
#   Filebeat (container logs) → [Beats input :5044]
#     → [filter: parse + enrich]
#       → [output: Elasticsearch]
#           Index: logs-{service}-YYYY.MM.dd
#           Fallback: logs-generic-YYYY.MM.dd
# =============================================================================

# -----------------------------------------------------------------------------
# INPUT — accept events from Filebeat (and any other Beat)
# -----------------------------------------------------------------------------
input {
  beats {
    port => 5044
    # Decompress compressed batches sent by Filebeat
    # (filebeat.yml sets compression_level: 3)
  }
}

# -----------------------------------------------------------------------------
# FILTER — parse, enrich, and normalise each event
# -----------------------------------------------------------------------------
filter {

  # ---------- Service routing ------------------------------------------------
  # Filebeat copies the Docker compose service name into fields.service.
  # Use it to route to per-service indices and apply service-specific parsing.
  if [fields][service] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "logs-%{[fields][service]}" }
      add_tag    => [ "service_%{[fields][service]}" ]
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "logs-generic" }
    }
  }

  # ---------- Java / Flink log parsing ----------------------------------------
  # Flink logs follow the pattern:
  #   YYYY-MM-DD HH:MM:SS,mmm LEVEL [thread] class - message
  if [fields][service] in ["flink-jobmanager", "flink-taskmanager-1", "flink-taskmanager-2"] {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log.timestamp} %{LOGLEVEL:log.level}%{SPACE}\[%{DATA:thread.name}\]%{SPACE}%{DATA:log.logger}%{SPACE}-%{SPACE}%{GREEDYDATA:log.message}"
      }
      tag_on_failure => ["_grokparsefailure_flink"]
    }
    if !("_grokparsefailure_flink" in [tags]) {
      date {
        match => ["log.timestamp", "yyyy-MM-dd HH:mm:ss,SSS"]
        target => "@timestamp"
        timezone => "UTC"
      }
      # Escalate: if the Flink log contains a checkpoint failure, tag it
      if [log.message] =~ /checkpoint.*fail|FAILED|exception/i {
        mutate { add_tag => ["checkpoint_failure"] }
      }
    }
  }

  # ---------- ClickHouse log parsing ------------------------------------------
  # ClickHouse text logs: YYYY.MM.DD HH:MM:SS.mmm [ thread_id ] {query_id} <level> logger: message
  if [fields][service] == "clickhouse" {
    grok {
      match => {
        "message" => "%{DATA:log.timestamp} \[ %{NUMBER:thread.id} \] \{%{DATA:clickhouse.query_id}\} <%{LOGLEVEL:log.level}> %{DATA:log.logger}: %{GREEDYDATA:log.message}"
      }
      tag_on_failure => ["_grokparsefailure_clickhouse"]
    }
    if !("_grokparsefailure_clickhouse" in [tags]) {
      date {
        match => ["log.timestamp", "yyyy.MM.dd HH:mm:ss.SSSSSS"]
        target => "@timestamp"
        timezone => "UTC"
      }
    }
  }

  # ---------- Kafka broker log parsing ----------------------------------------
  if [fields][service] in ["kafka-1", "kafka-2"] {
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:log.timestamp}\] %{LOGLEVEL:log.level} %{GREEDYDATA:log.message} \(%{DATA:log.logger}\)"
      }
      tag_on_failure => ["_grokparsefailure_kafka"]
    }
  }

  # ---------- Druid log parsing -----------------------------------------------
  if [fields][service] =~ /^druid-/ {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log.timestamp} %{LOGLEVEL:log.level}\s+\[%{DATA:thread.name}\] %{DATA:log.logger} - %{GREEDYDATA:log.message}"
      }
      tag_on_failure => ["_grokparsefailure_druid"]
    }
  }

  # ---------- Python log parsing (event_generator, Airflow) -------------------
  if [fields][service] in ["airflow-worker", "airflow-scheduler"] or [log.message] =~ /^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},/ {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log.timestamp} %{LOGLEVEL:log.level} %{GREEDYDATA:log.message}"
      }
      tag_on_failure => ["_grokparsefailure_python"]
    }
  }

  # ---------- Normalise log level values --------------------------------------
  # Elasticsearch ECS uses lowercase: "error", "warn", "info", "debug"
  if [log][level] {
    mutate {
      lowercase => ["[log][level]"]
    }
    # Map Logback / Java util logging variants
    if [log][level] == "warning" { mutate { replace => { "[log][level]" => "warn" } } }
    if [log][level] == "severe"  { mutate { replace => { "[log][level]" => "error" } } }
    if [log][level] == "fine"    { mutate { replace => { "[log][level]" => "debug" } } }
  }

  # ---------- Remove noisy / redundant fields ---------------------------------
  mutate {
    remove_field => [
      "[agent][ephemeral_id]",
      "[ecs][version]",
      "[input][type]",
      "prospector",
      "beat",
      "offset"
    ]
  }

  # ---------- Error escalation ------------------------------------------------
  # Tag any event that contains an exception class name for alerting
  if [message] =~ /Exception|ERROR|FATAL/ and [log][level] in ["error", "fatal"] {
    mutate { add_tag => ["application_error"] }
  }

}

# -----------------------------------------------------------------------------
# OUTPUT — write to Elasticsearch with daily rolling indices
# -----------------------------------------------------------------------------
output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    # Per-service daily index: logs-flink-jobmanager-2026.05.11
    # Falls back to logs-generic-YYYY.MM.dd if service tag is missing
    index    => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    # Retry failed bulk indexing requests up to 3 times before dropping
    retry_on_conflict => 3
  }

  # Uncomment to also write to stdout for debugging (very verbose)
  # stdout { codec => rubydebug }
}
