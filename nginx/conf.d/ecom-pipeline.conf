# ==============================================================================
# conf.d/ecom-pipeline.conf — E-Commerce Realtime Analytics Pipeline
# Reverse proxy site configuration
#
# Replace every occurrence of "YOUR_DOMAIN" with your actual domain name
# before deploying, e.g.: sed -i 's/YOUR_DOMAIN/analytics.example.com/g' ecom-pipeline.conf
# ==============================================================================

# ── Upstream definitions ──────────────────────────────────────────────────────
# Use Docker / DNS names inside Docker Compose network (ecom-net).
# For bare-metal / VM deployments use localhost:<port>.

upstream dashboard_ui {
    server dashboard-ui:80;
    # Add more instances for load balancing:
    # server dashboard-ui-2:80;
    keepalive 32;
}

upstream dashboard_api {
    server dashboard-api:8000;
    keepalive 32;
}

upstream druid_router {
    server druid-router:8888;
    keepalive 16;
}

upstream flink_ui {
    # Flink REST / Web UI — internal container port is 8081
    server flink-jobmanager:8081;
    keepalive 8;
}

upstream kibana_ui {
    server kibana:5601;
    keepalive 8;
}

# ── CORS map ─────────────────────────────────────────────────────────────────
# Allows the dashboard origin to call the API without preflight rejection.
map $http_origin $cors_origin {
    default                        "";
    "https://YOUR_DOMAIN"          "https://YOUR_DOMAIN";
    "http://localhost:3000"        "http://localhost:3000";
    "http://localhost:5173"        "http://localhost:5173";
}

# ── Upgrade map (WebSocket support) ──────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ""       close;
}

# ══════════════════════════════════════════════════════════════════════════════
# SERVER BLOCK 1 — HTTP (port 80)
# Redirect all HTTP traffic to HTTPS + serve ACME challenge for Let's Encrypt
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen      80;
    listen      [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── Let's Encrypt ACME challenge ─────────────────────────────────────────
    # certbot places challenge files here; must be accessible over plain HTTP
    location /.well-known/acme-challenge/ {
        root    /var/www/certbot;
        default_type "text/plain";
        allow   all;
    }

    # ── Redirect everything else to HTTPS ────────────────────────────────────
    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# SERVER BLOCK 2 — HTTPS (port 443)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── TLS certificates (managed by certbot) ────────────────────────────────
    ssl_certificate      /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # ── TLS hardening (TLS 1.2+, HSTS, OCSP) ────────────────────────────────
    include /etc/nginx/snippets/ssl-params.conf;

    # ── Security response headers ─────────────────────────────────────────────
    # Note: CSP / X-Frame-Options are set per-location where needed
    add_header X-Content-Type-Options  "nosniff"    always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/access.log    json_access;
    error_log   /var/log/nginx/error.log     warn;

    # ── Connection limits per IP ──────────────────────────────────────────────
    limit_conn  conn_limit  50;

    # ── Default proxy headers ─────────────────────────────────────────────────
    include /etc/nginx/snippets/proxy-params.conf;

    # ──────────────────────────────────────────────────────────────────────────
    # LOCATION: / → dashboard-ui (React SPA)
    # ──────────────────────────────────────────────────────────────────────────
    location / {
        limit_req  zone=general  burst=50  nodelay;

        proxy_pass  http://dashboard_ui;

        # SPA fallback — if the upstream Nginx in dashboard-ui doesn't handle
        # this, uncomment the try_files below instead of proxy_pass
        # try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico|webp)$ {
            proxy_pass             http://dashboard_ui;
            proxy_cache_valid      200 1d;
            add_header             Cache-Control "public, max-age=86400, immutable";
            add_header             X-Content-Type-Options "nosniff" always;
        }
    }

    # ──────────────────────────────────────────────────────────────────────────
    # LOCATION: /api → dashboard-api (FastAPI)
    # ──────────────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api  burst=20  nodelay;

        proxy_pass  http://dashboard_api/api/;

        # ── CORS (cross-origin API calls from the React dashboard) ──────────
        if ($request_method = 'OPTIONS') {
            add_header  Access-Control-Allow-Origin      $cors_origin;
            add_header  Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS";
            add_header  Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-ID, X-Requested-With, Accept, Origin";
            add_header  Access-Control-Allow-Credentials "true";
            add_header  Access-Control-Max-Age           1728000;
            add_header  Content-Type                     "text/plain charset=UTF-8";
            add_header  Content-Length                   0;
            return 204;
        }

        add_header  Access-Control-Allow-Origin      $cors_origin  always;
        add_header  Access-Control-Allow-Methods     "GET, POST, OPTIONS"  always;
        add_header  Access-Control-Allow-Credentials "true"  always;
        add_header  Access-Control-Expose-Headers    "X-Request-ID"  always;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # LOCATION: /ws → dashboard-api WebSocket (live event stream)
    # ──────────────────────────────────────────────────────────────────────────
    location /ws {
        limit_req  zone=websocket  burst=5  nodelay;

        proxy_pass              http://dashboard_api/ws;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
        proxy_set_header        Host       $host;
        proxy_read_timeout      3600s;   # keep WebSocket alive for 1 h
        proxy_send_timeout      3600s;
        proxy_connect_timeout   10s;

        # Disable buffering for real-time streaming
        proxy_buffering         off;
        proxy_cache             off;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # LOCATION: /metrics → Prometheus scrape endpoint
    # Restrict to Prometheus server IP only
    # ──────────────────────────────────────────────────────────────────────────
    location /metrics {
        # Allow only internal Prometheus server
        allow  127.0.0.1;
        allow  172.16.0.0/12;   # Docker bridge network range
        deny   all;

        proxy_pass  http://dashboard_api/metrics;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # LOCATION: /druid → Druid Console
    # Admin route — rate-limited + Basic Auth required
    # ──────────────────────────────────────────────────────────────────────────
    location /druid/ {
        limit_req  zone=admin  burst=10  nodelay;

        # Basic authentication
        auth_basic           "Druid Console — Restricted";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass  http://druid_router/;

        # Rewrite redirects from upstream to preserve /druid prefix
        proxy_redirect  / /druid/;

        # Pass host so Druid's internal links resolve
        proxy_set_header  Host  $host;

        # X-Frame-Options: allow Druid's embedded iframes
        add_header  X-Frame-Options  "SAMEORIGIN"  always;

        # Increase timeouts for long-running Druid queries
        proxy_read_timeout   300s;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # LOCATION: /flink → Flink Web UI
    # Admin route — rate-limited + Basic Auth required
    # ──────────────────────────────────────────────────────────────────────────
    location /flink/ {
        limit_req  zone=admin  burst=10  nodelay;

        auth_basic           "Flink UI — Restricted";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass  http://flink_ui/;
        proxy_redirect  / /flink/;

        # Flink uses Server-Sent Events for log streaming — increase timeout
        proxy_read_timeout   600s;
        proxy_buffering      off;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # LOCATION: /kibana → Kibana
    # Admin route — rate-limited + Basic Auth required
    # ──────────────────────────────────────────────────────────────────────────
    location /kibana/ {
        limit_req  zone=admin  burst=10  nodelay;

        auth_basic           "Kibana — Restricted";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass  http://kibana_ui/;
        proxy_redirect  / /kibana/;

        # Kibana requires these headers to work behind a sub-path proxy
        proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Host   $host;
        proxy_set_header  X-Forwarded-Server $host;
        proxy_set_header  X-Forwarded-Port   443;
        proxy_set_header  X-Forwarded-Proto  https;

        # Kibana Server BasePath must be set in kibana.yml:
        # server.basePath: "/kibana"
        # server.rewriteBasePath: true
    }

    # ──────────────────────────────────────────────────────────────────────────
    # LOCATION: /health — nginx health check endpoint
    # Used by load balancers and Docker healthcheck
    # ──────────────────────────────────────────────────────────────────────────
    location = /health {
        access_log  off;
        return 200  "healthy\n";
        add_header  Content-Type  text/plain;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # LOCATION: /nginx-status — stub_status for monitoring
    # Restricted to internal network only
    # ──────────────────────────────────────────────────────────────────────────
    location = /nginx-status {
        stub_status;
        allow  127.0.0.1;
        allow  172.16.0.0/12;
        deny   all;
        access_log off;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page  429  /429.html;
    error_page  500 502 503 504  /50x.html;

    location = /429.html {
        internal;
        root  /usr/share/nginx/html;
        add_header  Retry-After  "60"  always;
    }

    location = /50x.html {
        internal;
        root  /usr/share/nginx/html;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# SERVER BLOCK 3 — catch-all (reject unknown Host headers)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen      80  default_server;
    listen      443 ssl default_server;
    server_name _;

    ssl_certificate      /etc/nginx/ssl/dummy.crt;
    ssl_certificate_key  /etc/nginx/ssl/dummy.key;

    return 444;   # close connection without response
}
