# ==============================================================================
# snippets/proxy-params.conf — Common upstream proxy headers
# Include in every proxy_pass location block.
# ==============================================================================

proxy_http_version          1.1;

# ── Pass client information ───────────────────────────────────────────────────
proxy_set_header  Host               $host;
proxy_set_header  X-Real-IP          $remote_addr;
proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header  X-Forwarded-Proto  $scheme;
proxy_set_header  X-Forwarded-Host   $host;
proxy_set_header  X-Forwarded-Port   $server_port;

# ── Request tracing ───────────────────────────────────────────────────────────
proxy_set_header  X-Request-ID       $request_id;

# ── Disable connection close between nginx and upstream ───────────────────────
proxy_set_header  Connection         "";

# ── Buffering ─────────────────────────────────────────────────────────────────
proxy_buffering         on;
proxy_buffer_size       16k;
proxy_buffers           8 16k;
proxy_busy_buffers_size 32k;

# ── Upstream error handling ───────────────────────────────────────────────────
# Pass 5xx errors from upstream to the client (don't intercept)
proxy_intercept_errors  off;
