# ==============================================================================
# snippets/ssl-params.conf — TLS 1.2+ hardening
# Included in each HTTPS server block.
# Based on: https://ssl-config.mozilla.org/#server=nginx&config=intermediate
# ==============================================================================

# ── Certificate paths (set per-vhost) ────────────────────────────────────────
# ssl_certificate     /etc/letsencrypt/live/$domain/fullchain.pem;
# ssl_certificate_key /etc/letsencrypt/live/$domain/privkey.pem;

# ── Protocol: TLS 1.2 and 1.3 only ──────────────────────────────────────────
ssl_protocols               TLSv1.2 TLSv1.3;

# ── Cipher suites ─────────────────────────────────────────────────────────────
# TLS 1.3 uses its own modern cipher suites (no config needed).
# TLS 1.2 ciphers: prefer AES-GCM and CHACHA20 with PFS.
ssl_ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers   off;   # let clients pick; TLS 1.3 ignores this

# ── DH parameters (Diffie-Hellman key exchange) ───────────────────────────────
# Generate once: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
# (setup-certbot.sh does this automatically)
ssl_dhparam                 /etc/nginx/ssl/dhparam.pem;

# ── ECDH curve ────────────────────────────────────────────────────────────────
ssl_ecdh_curve              X25519:prime256v1:secp384r1;

# ── Session resumption (improves performance) ─────────────────────────────────
ssl_session_cache           shared:SSL:10m;   # ~40 000 sessions
ssl_session_timeout         1d;
ssl_session_tickets         off;              # tickets reduce forward secrecy

# ── OCSP stapling ─────────────────────────────────────────────────────────────
# Allows nginx to serve cached OCSP responses → faster TLS handshake
ssl_stapling                on;
ssl_stapling_verify         on;
resolver                    1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout            5s;

# ── HSTS ──────────────────────────────────────────────────────────────────────
# 1 year max-age; add preload only after you're sure you'll keep HTTPS
add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains"  always;
