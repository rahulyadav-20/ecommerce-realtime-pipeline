# ==============================================================================
# snippets/security-headers.conf — HTTP security response headers
# Included in every location block (or at server level).
# ==============================================================================

# ── Prevent clickjacking ──────────────────────────────────────────────────────
add_header  X-Frame-Options         "SAMEORIGIN"            always;

# ── Prevent MIME-type sniffing ────────────────────────────────────────────────
add_header  X-Content-Type-Options  "nosniff"               always;

# ── XSS protection (legacy browsers) ─────────────────────────────────────────
add_header  X-XSS-Protection        "1; mode=block"         always;

# ── Referrer policy ───────────────────────────────────────────────────────────
add_header  Referrer-Policy         "strict-origin-when-cross-origin" always;

# ── Content Security Policy ───────────────────────────────────────────────────
# Adjust if you load resources from external CDNs
add_header  Content-Security-Policy
    "default-src 'self'; "
    "script-src  'self' 'unsafe-inline' https://fonts.googleapis.com; "
    "style-src   'self' 'unsafe-inline' https://fonts.googleapis.com; "
    "font-src    'self' https://fonts.gstatic.com; "
    "img-src     'self' data: blob:; "
    "connect-src 'self' wss: ws:; "
    "frame-ancestors 'none';"
    always;

# ── Permissions policy (Feature-Policy successor) ─────────────────────────────
add_header  Permissions-Policy
    "geolocation=(), microphone=(), camera=(), payment=()"
    always;

# ── Remove server information ─────────────────────────────────────────────────
# server_tokens off is set in nginx.conf; this adds an extra header removal
more_clear_headers Server;         # requires nginx-extras or headers-more module
                                   # comment out if module not available
