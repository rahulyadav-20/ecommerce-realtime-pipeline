# ==============================================================================
# nginx.conf — E-Commerce Realtime Analytics Pipeline
# Reverse proxy with SSL termination, rate limiting, and JSON access logging
# ==============================================================================

# ── Worker processes ──────────────────────────────────────────────────────────
user  nginx;
worker_processes  auto;           # 1 worker per CPU core
worker_rlimit_nofile  65535;      # match OS ulimit from setup-vm.sh

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# ── Events ────────────────────────────────────────────────────────────────────
events {
    worker_connections  4096;     # max simultaneous connections per worker
    use                 epoll;    # most efficient on Linux
    multi_accept        on;       # accept all pending connections at once
}

# ══════════════════════════════════════════════════════════════════════════════
http {
# ══════════════════════════════════════════════════════════════════════════════

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    server_tokens      off;       # hide nginx version from response headers

    # ── Buffer tuning ─────────────────────────────────────────────────────────
    client_body_buffer_size    128k;
    client_max_body_size       50m;   # allow uploads (event replay, config files)
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    client_body_timeout    30s;
    client_header_timeout  30s;
    send_timeout           30s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    5;          # balance between speed and ratio
    gzip_buffers       16 8k;
    gzip_min_length    1024;       # don't compress tiny responses
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/vnd.ms-fontobject
        font/ttf
        font/opentype
        image/svg+xml;

    # ── JSON access log format (Filebeat → ELK) ───────────────────────────────
    # All fields are set to log to ELK pipeline for dashboarding.
    log_format json_access escape=json
        '{'
          '"@timestamp":"$time_iso8601",'
          '"remote_addr":"$remote_addr",'
          '"x_forwarded_for":"$http_x_forwarded_for",'
          '"request_id":"$request_id",'
          '"method":"$request_method",'
          '"uri":"$request_uri",'
          '"protocol":"$server_protocol",'
          '"status":$status,'
          '"bytes_sent":$body_bytes_sent,'
          '"request_time":$request_time,'
          '"upstream_addr":"$upstream_addr",'
          '"upstream_status":"$upstream_status",'
          '"upstream_response_time":"$upstream_response_time",'
          '"http_referer":"$http_referer",'
          '"http_user_agent":"$http_user_agent",'
          '"ssl_protocol":"$ssl_protocol",'
          '"ssl_cipher":"$ssl_cipher"'
        '}';

    # Access log with JSON format — Filebeat ships this to Elasticsearch
    access_log  /var/log/nginx/access.log  json_access  buffer=16k flush=5s;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Zone sizes: 1 MB ≈ 16 000 states (binary IP address keys)

    # General web traffic — 200 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=general:10m  rate=200r/m;

    # API endpoints — 100 req/min per IP (matches prompt spec)
    limit_req_zone  $binary_remote_addr  zone=api:10m      rate=100r/m;

    # Admin UIs (Druid, Flink, Kibana) — 30 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=admin:10m    rate=30r/m;

    # WebSocket connections — 10 new connections/min per IP
    limit_req_zone  $binary_remote_addr  zone=websocket:5m rate=10r/m;

    # Return 429 Too Many Requests instead of the default 503
    limit_req_status  429;
    limit_conn_status 429;

    # ── Connection limiting ───────────────────────────────────────────────────
    limit_conn_zone  $binary_remote_addr  zone=conn_limit:10m;

    # ── Real-IP (if behind a cloud load balancer) ─────────────────────────────
    # Uncomment and add your LB CIDR if nginx sits behind an ELB / ALB:
    # set_real_ip_from  10.0.0.0/8;
    # real_ip_header    X-Forwarded-For;
    # real_ip_recursive on;

    # ── Include site-specific configs ─────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;

# ══════════════════════════════════════════════════════════════════════════════
}
# ══════════════════════════════════════════════════════════════════════════════
