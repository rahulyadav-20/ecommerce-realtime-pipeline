# ==============================================================================
# /etc/sysctl.d/99-ecom-pipeline.conf
# Kernel parameter tuning for the E-Commerce Realtime Analytics Pipeline
#
# Apply manually:   sudo sysctl --system
# Apply single key: sudo sysctl -w vm.max_map_count=262144
# Verify:           sysctl vm.max_map_count net.core.somaxconn fs.file-max
# ==============================================================================

# ── Virtual Memory ─────────────────────────────────────────────────────────────
# Required by Elasticsearch (dies with OOM if < 262144).
# Also improves ClickHouse's mmap-based storage engine.
# Default Ubuntu value: 65530
vm.max_map_count = 262144

# Keep pages in memory rather than swapping.
# 0 = never swap (ideal for Kafka / Druid latency).
# 1 = minimal swapping (safe compromise if swap exists).
vm.swappiness = 1

# Reduce dirty-page writeback lag to avoid large I/O stalls.
# At 10 %: dirty flush triggers at ~1 GB on a 10 GB machine.
vm.dirty_ratio            = 10
vm.dirty_background_ratio = 5

# Aggressive overcommit — Flink JVM and many JVM apps need this.
# 0 = heuristic (default), 1 = always allow, 2 = never
vm.overcommit_memory = 1

# ── Network — Kafka high-throughput tuning ────────────────────────────────────
# Maximum number of connections queued before accept() handles them.
# Kafka brokers / ClickHouse HTTP server benefit significantly.
net.core.somaxconn = 4096

# TCP socket backlog for listening sockets
net.ipv4.tcp_max_syn_backlog = 4096

# Max number of packets in the kernel network queue
net.core.netdev_max_backlog = 16384

# TCP send/receive buffer sizes (min / default / max)
# 16 MB max allows high-throughput Kafka produce without buffer exhaustion.
net.core.rmem_max          = 16777216
net.core.wmem_max          = 16777216
net.ipv4.tcp_rmem          = 4096 1048576 16777216
net.ipv4.tcp_wmem          = 4096 1048576 16777216

# Keep sockets in TIME_WAIT state shorter (default: 60 s)
# Reduces port exhaustion during high producer/consumer churn.
net.ipv4.tcp_fin_timeout   = 15

# Reuse TIME_WAIT sockets for new connections
net.ipv4.tcp_tw_reuse      = 1

# ── File Descriptors ──────────────────────────────────────────────────────────
# System-wide file handle limit.
# Kafka opens one fd per partition replica + log segment.
# ClickHouse opens one fd per data part.
# Flink opens fds for RocksDB SST files.
# 2 M handles is safe and well below Linux maximum (varies by RAM).
fs.file-max = 2097152

# Inotify: used by Flink checkpoint dir monitoring and log-shipping agents.
fs.inotify.max_user_watches   = 524288
fs.inotify.max_user_instances = 512

# ── Docker / Container networking ─────────────────────────────────────────────
# Bridge netfilter — required for Docker iptables rules to work correctly.
net.bridge.bridge-nf-call-iptables  = 1
net.bridge.bridge-nf-call-ip6tables = 1

# IP forwarding — required for Docker network routing between containers.
net.ipv4.ip_forward = 1
